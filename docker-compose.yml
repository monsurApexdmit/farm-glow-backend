services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: farm-glow-app
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - farm-glow
      - database_db_network
    environment:
      - DB_HOST=central_mysql
      - DB_PORT=3306
      - DB_DATABASE=farm_glow
      - DB_USERNAME=admin
      - DB_PASSWORD=admin123
      - REDIS_HOST=central_redis
      - REDIS_PORT=6379
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: farm-glow-nginx
    ports:
      - "8006:80"
    volumes:
      - ./:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - farm-glow
    restart: unless-stopped

networks:
  farm-glow:
    driver: bridge
  database_db_network:
    external: true
